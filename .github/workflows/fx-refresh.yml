name: Daily FX Rate Refresh

on:
  schedule:
    # Run at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      base_currency:
        description: 'Base currency (default: ILS)'
        required: false
        default: 'ILS'

jobs:
  refresh-fx-rates:
    runs-on: ubuntu-latest
    steps:
      # ILS as primary base (covers all currencies via inverse lookup)
      - name: Refresh ILS rates
        run: |
          CURRENCY="${{ github.event.inputs.base_currency || 'ILS' }}"
          DATE=$(date -u +%Y-%m-%d)

          # Use FX_REFRESH_SECRET if set, otherwise fall back to anon key
          SECRET="${{ secrets.FX_REFRESH_SECRET }}"
          ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          AUTH_TOKEN="${SECRET:-$ANON_KEY}"

          echo "Refreshing FX rates for ${CURRENCY} on ${DATE}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "apikey: ${ANON_KEY}" \
            -d "{\"base_currency\": \"${CURRENCY}\", \"date\": \"${DATE}\"}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/fx-refresh-daily-rates")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response (${HTTP_CODE}): ${BODY}"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::FX refresh failed with HTTP ${HTTP_CODE}: ${BODY}"
            exit 1
          fi

          echo "FX rates refreshed successfully!"

      # USD as universal cross-rate fallback
      - name: Refresh USD rates
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SECRET="${{ secrets.FX_REFRESH_SECRET }}"
          ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          AUTH_TOKEN="${SECRET:-$ANON_KEY}"

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "apikey: ${ANON_KEY}" \
            -d "{\"base_currency\": \"USD\", \"date\": \"${DATE}\"}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/fx-refresh-daily-rates"
